<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --yellow: #FFD60A;
  --yellow-deep: #F2C400;
  --black: #0B0B0B;
  --ink: #1A1614;
  --red: #B81818;
  --red-deep: #8C0F0F;
  --paper: #F3E7C2;
  --paper-deep: #E6D6A3;
  --rule: rgba(11,11,11,0.18);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--yellow);
  color: var(--black);
  font-family: "Space Grotesk", -apple-system, system-ui, sans-serif;
  font-size: 18px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; }
a { color: inherit; }

.display, h1, h2, .h-display {
  font-family: "Anton", "Archivo Black", Impact, sans-serif;
  font-weight: 400;
  letter-spacing: -0.005em;
  line-height: 0.86;
  text-transform: uppercase;
}
.mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

/* ----------- shared layout ----------- */
.wrap { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .wrap { padding: 0 20px; } }

.section { padding: 96px 0; position: relative; }
@media (max-width: 720px) { .section { padding: 64px 0; } }

.section.black { background: var(--black); color: var(--yellow); }
.section.paper { background: var(--paper); color: var(--black); }
.section.red { background: var(--red); color: var(--yellow); }

.kicker {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.kicker::before {
  content: "";
  display: inline-block;
  width: 28px; height: 1.5px;
  background: currentColor;
}
.kicker.no-rule::before { display: none; }

/* ----------- top bar ----------- */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--yellow);
  border-bottom: 1.5px solid var(--black);
}
.topbar.scrolled { box-shadow: 0 1px 0 var(--black); }
.topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.topbar-mark { display: flex; align-items: center; gap: 10px; font-weight: 700; }
.topbar-mark .dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; }
.topbar-cta {
  background: var(--black); color: var(--yellow);
  border: none; padding: 10px 16px;
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700;
  transition: transform .15s ease;
}
.topbar-cta:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--red); }
.topbar-meta { display: flex; gap: 24px; opacity: 0.8; }
@media (max-width: 720px) {
  .topbar-meta { display: none; }
  .topbar-inner { padding: 12px 20px; }
}

/* ----------- HERO ----------- */
.hero { padding: 56px 0 96px; position: relative; overflow: hidden; }
.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 56px;
  align-items: center;
}
@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .cover-stage { margin-top: 24px; }
}
@media (max-width: 720px) {
  .hero { padding: 32px 0 48px; }
  .hero-copy { overflow-wrap: break-word; word-break: break-word; min-width: 0; }
  .hero h1 { font-size: clamp(28px, 9.5vw, 52px); line-height: 0.9; }
  .hero-sub { font-size: 16px; }
  .hero-eyebrow { gap: 10px; }
  .cover-stage { display: none; }
  .hero-form { margin-top: 28px; }
  .hero-form .form-with-note { flex-direction: column; align-items: stretch; gap: 14px; }
  .hero-form .form-row { display: flex !important; flex-direction: column !important; width: 100%; border: 2px solid var(--black); }
  .hero-form input { width: 100% !important; padding: 16px 14px; box-sizing: border-box; border-bottom: 1px solid rgba(0,0,0,0.15); }
  .hero-form button { width: 100% !important; border-left: none !important; border-top: 2px solid var(--black) !important; padding: 16px 14px !important; text-align: center; }
  .hero-form .form-side-note { max-width: 100%; font-size: 14px; }
}

.hero-eyebrow {
  display: flex; gap: 18px; flex-wrap: wrap;
  align-items: center;
  margin-bottom: 24px;
}
.tag {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  padding: 6px 10px;
  border: 1.5px solid var(--black);
  background: transparent;
}
.tag.solid { background: var(--black); color: var(--yellow); border-color: var(--black); }
.tag.red { background: var(--red); color: var(--yellow); border-color: var(--red); }

.hero h1 {
  font-size: clamp(72px, 13.5vw, 220px);
  margin: 0;
}
.hero h1 .accent { color: var(--red); }
.hero h1 .underline { text-decoration: underline; text-decoration-thickness: 0.06em; text-underline-offset: -0.02em; }

.hero-sub {
  font-size: clamp(20px, 2.1vw, 26px);
  line-height: 1.3;
  margin: 28px 0 0;
  font-weight: 500;
}
.hero-sub b { font-weight: 700; }

.hero-form {
  margin-top: 36px;
}
.hero-form .form-with-note {
  display: flex;
  align-items: center;
  gap: 24px;
}
.hero-form .form-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0;
  border: 2px solid var(--black);
  background: #fff;
  flex-shrink: 0;
}
.hero-form input {
  border: none; background: transparent;
  padding: 18px 18px;
  font: inherit; font-size: 17px;
  outline: none;
  color: var(--black);
  min-width: 0;
  width: 260px;
}
.hero-form input::placeholder { color: rgba(11,11,11,0.55); }
.hero-form button {
  border: none; border-left: 2px solid var(--black);
  background: var(--red); color: var(--yellow);
  padding: 0 22px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s ease, color .15s ease;
}
.hero-form button:hover { background: var(--black); color: var(--yellow); }
.hero-form .reassure { display: none; }
.hero-form .form-side-note {
  font-size: 15px;
  line-height: 1.4;
  font-weight: 500;
  max-width: 280px;
}
.hero-form .form-side-note .accent { color: var(--red); font-weight: 700; }
.hero-form .pricetag {
  margin-top: 20px;
  display: inline-flex; align-items: center; gap: 12px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  background: var(--black); color: var(--yellow);
  padding: 10px 14px;
}
.hero-form .pricetag b { color: #fff; font-weight: 700; }
.hero-form .err {
  margin-top: 8px;
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  color: var(--red);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* book cover composition */
.cover-stage {
  position: relative;
  padding-bottom: 12px;
  margin-top: -340px;
}
.cover-card {
  position: relative;
  display: inline-block;
  transform: rotate(-2.5deg);
  box-shadow:
    8px 8px 0 var(--black),
    16px 16px 0 var(--red);
  border: 2px solid var(--black);
  transition: transform .4s cubic-bezier(.2,.7,.2,1);
}
.cover-card:hover { transform: rotate(-1deg) translate(-2px,-4px); }
.cover-card img { width: 100%; max-width: 460px; display: block; }
.cover-stamp {
  position: absolute;
  top: 0; right: 0;
  background: var(--red);
  color: var(--yellow);
  font-family: "JetBrains Mono", monospace;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 14px 16px;
  border: 2px solid var(--yellow);
  outline: 2px solid var(--red);
  transform: translate(50%, calc(-50% - 20px)) rotate(18deg);
  text-align: center;
  line-height: 1.1;
}
.cover-stamp .big { display: block; font-size: 22px; letter-spacing: 0.04em; margin-bottom: 2px; }
.cover-meta {
  margin-top: 22px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px 18px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.cover-meta dt { font-weight: 700; opacity: 0.6; }
.cover-meta dd { margin: 0; }

/* sticker scroll cue */
.scroll-cue {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 48px;
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  opacity: 0.75;
}
.scroll-cue::before {
  content: "â†“";
  display: inline-block;
  font-size: 14px;
  animation: bob 1.6s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform: translateY(0)} 50%{transform: translateY(4px)} }

/* ----------- generic section header ----------- */
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; margin-bottom: 56px;
  flex-wrap: wrap;
}
.section-head h2 {
  margin: 0;
  font-size: clamp(54px, 8vw, 132px);
  max-width: 18ch;
}
.section-head .case-id {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  text-align: right;
  white-space: nowrap;
}
.section-head .case-id b { display: block; font-size: 18px; letter-spacing: 0.04em; margin-top: 4px; }
.section-intro {
  font-size: clamp(20px, 2vw, 26px);
  max-width: 760px;
  margin-bottom: 56px;
  line-height: 1.35;
}
.section-intro em { color: var(--red); font-style: normal; }
.section.black .section-intro em { color: var(--yellow); text-decoration: underline; text-decoration-color: var(--red); text-decoration-thickness: 3px; }

/* ----------- PROBLEMA list ----------- */
.problema-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1.5px solid var(--rule);
}
@media (max-width: 720px) { .problema-grid { grid-template-columns: 1fr; } }
.problema-row {
  display: flex; align-items: baseline; gap: 24px;
  padding: 22px 4px 22px 0;
  border-bottom: 1.5px solid var(--rule);
  font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 500;
  line-height: 1.2;
}
.problema-row .num {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  opacity: 0.5;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}
.problema-row .check {
  margin-left: auto;
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--black); color: var(--yellow);
  padding: 4px 8px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .3s ease;
}
.problema-row:hover .check { opacity: 1; }
.problema-row.final {
  grid-column: 1 / -1;
  justify-content: center;
  text-align: center;
  font-weight: 700;
  border-bottom: none;
  padding-top: 32px;
  padding-bottom: 32px;
  border-top: 1.5px solid var(--rule);
}
.problema-row.final .num { display: none; }
.problema-row.final .check { margin-left: 0; }

.problema-final {
  margin-top: 56px;
  text-align: center;
  font-family: "Anton", sans-serif;
  font-size: clamp(48px, 8vw, 120px);
  line-height: 0.9;
  text-transform: uppercase;
}
.problema-final span { color: var(--red); }

.libro-aperto {
  margin-top: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.libro-aperto .libro-label {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--yellow);
  opacity: 0.6;
  margin-bottom: 20px;
}
.libro-aperto .libro-frame {
  display: inline-block;
  transform: rotate(-1.5deg);
  border: 2px solid var(--yellow);
  box-shadow: 8px 8px 0 var(--red), 16px 16px 0 rgba(255,214,10,0.25);
  transition: transform .4s cubic-bezier(.2,.7,.2,1);
  max-width: 860px;
  width: 100%;
}
.libro-aperto .libro-frame:hover {
  transform: rotate(-0.5deg) translate(-2px,-4px);
}
.libro-aperto img {
  max-width: 100%;
  width: 860px;
  display: block;
}
.libro-aperto .libro-frame { cursor: zoom-in; }

.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.92);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fade .2s ease;
}
.lightbox img {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  display: block;
  touch-action: pinch-zoom;
}
.lightbox-close {
  position: fixed; top: 16px; right: 16px;
  background: var(--red); color: var(--yellow);
  border: none; font-family: "JetBrains Mono", monospace;
  font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
  padding: 10px 16px; cursor: pointer; z-index: 201;
  text-transform: uppercase;
}

/* ----------- CONCEPT - the Coinquilino ----------- */
.concept-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 64px;
  align-items: flex-start;
}
@media (max-width: 980px) { .concept-grid { grid-template-columns: 1fr; gap: 36px; } }

.concept-id-card {
  background: var(--yellow);
  color: var(--black);
  border: 2px solid var(--yellow);
  padding: 28px;
  font-family: "JetBrains Mono", monospace;
  position: relative;
}
.concept-id-card::before {
  content: "";
  position: absolute; inset: -2px;
  background: repeating-linear-gradient(45deg, transparent 0 8px, var(--red) 8px 16px);
  z-index: -1;
}
.concept-id-card h3 {
  margin: 0 0 18px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 700;
}
.concept-id-card .name {
  font-family: "Anton", sans-serif;
  font-size: clamp(40px, 5vw, 64px);
  line-height: 0.9;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.concept-id-card .name .red { color: var(--red); }
.concept-id-card dl { display: grid; grid-template-columns: auto 1fr; gap: 10px 16px; margin: 16px 0 0; font-size: 12px; letter-spacing: 0.06em; }
.concept-id-card dt { font-weight: 700; opacity: 0.6; text-transform: uppercase; }
.concept-id-card dd { margin: 0; text-transform: uppercase; }
.concept-id-card .photo {
  width: 100%; aspect-ratio: 4/5;
  background: var(--paper);
  border: 1.5px dashed rgba(255,214,10,0.4);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
.concept-id-card .photo .silhouette {
  width: 60%; height: 80%;
  background: var(--black);
  clip-path: polygon(28% 0, 72% 0, 78% 26%, 92% 30%, 100% 100%, 0 100%, 8% 30%, 22% 26%);
  margin-top: 16%;
}
.concept-id-card .photo .eyes {
  position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px;
}
.concept-id-card .photo .eyes span {
  width: 12px; height: 12px; background: var(--yellow); border-radius: 50%;
  animation: blink 4s infinite;
}
.concept-id-card .photo .eyes span:nth-child(2) { animation-delay: 0.2s; }
@keyframes blink { 0%, 92%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
.concept-id-card .photo .stamp {
  position: absolute; bottom: 12px; right: 12px;
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--red); border: 1.5px solid var(--red); padding: 4px 8px;
  transform: rotate(-6deg);
  font-weight: 700;
}

.concept-actions { display: flex; flex-direction: column; gap: 18px; }
.concept-action {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 20px;
  padding-bottom: 18px;
  border-bottom: 1.5px solid rgba(255,214,10,0.18);
  align-items: baseline;
}
.concept-action:last-child { border-bottom: none; }
.concept-action .time {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px; letter-spacing: 0.1em;
  color: var(--red);
  padding-top: 4px;
}
.concept-action .what {
  font-size: clamp(20px, 2.1vw, 26px);
  line-height: 1.3;
  font-weight: 500;
}
.concept-action .what b { font-weight: 700; }
.concept-action .what s { text-decoration-color: var(--red); text-decoration-thickness: 2px; }

/* ----------- COSA TROVERAI (scenes) ----------- */
.scenes-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}
.scene {
  background: var(--paper-deep);
  border: 2px solid var(--black);
  padding: 28px;
  position: relative;
  min-height: 240px;
  display: flex; flex-direction: column; justify-content: space-between;
  transition: transform .25s ease;
  overflow: hidden;
}
.scene:hover { transform: translate(-3px,-3px); box-shadow: 6px 6px 0 var(--black); }
.scene .ep {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  opacity: 0.55;
  display: flex; justify-content: space-between;
}
.scene h3 {
  font-family: "Anton", sans-serif;
  text-transform: uppercase;
  font-size: clamp(36px, 4.6vw, 58px);
  margin: 16px 0 12px;
  line-height: 0.9;
}
.scene p { margin: 0; font-size: 16px; line-height: 1.4; }
.scene.size-l { grid-column: span 6; }
.scene.size-m { grid-column: span 4; }
.scene.size-s { grid-column: span 3; }
.scene.size-w { grid-column: span 8; }
.scene.size-full { grid-column: span 12; }
.scene.dark { background: var(--black); color: var(--yellow); border-color: var(--black); }
.scene.red-bg { background: var(--red); color: var(--yellow); border-color: var(--red); }
.scene.red-bg h3 { color: var(--yellow); }
@media (max-width: 980px) {
  .scenes-grid { grid-template-columns: 1fr 1fr; }
  .scene.size-l, .scene.size-m, .scene.size-s, .scene.size-w { grid-column: span 1; }
  .scene.size-full { grid-column: span 2; }
}
@media (max-width: 580px) {
  .scenes-grid { grid-template-columns: 1fr; }
  .scene.size-full { grid-column: span 1; }
}

/* ----------- ESTRATTI - quote cards / dossiers ----------- */
.estratti-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 28px;
  align-items: start;
}
@media (max-width: 980px) { .estratti-grid { grid-template-columns: 1fr 1fr; gap: 20px; } }
@media (max-width: 580px) { .estratti-grid { grid-template-columns: 1fr; } }
.postit {
  padding: 28px 26px;
  font-family: "Space Grotesk", sans-serif;
  font-size: clamp(18px, 1.6vw, 22px);
  font-weight: 500;
  line-height: 1.32;
  box-shadow: 6px 6px 0 rgba(0,0,0,0.25);
  position: relative;
}
.postit .quote-mark {
  font-family: "Anton", sans-serif;

  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clamp = React.useCallback(function() {
    var panel = dragRef.current;
    if (!panel) return;
    var maxRight = Math.max(PAD, window.innerWidth - panel.offsetWidth - PAD);
    var maxBottom = Math.max(PAD, window.innerHeight - panel.offsetHeight - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(function() {
    if (!open) return;
    clamp();
    window.addEventListener('resize', clamp);
    return function() { window.removeEventListener('resize', clamp); };
  }, [open, clamp]);
  React.useEffect(function() {
    function onMsg(e) {
      var t = e && e.data && e.data.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return function() { window.removeEventListener('message', onMsg); };
  }, []);
  function dismiss() {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  }
  function onDragStart(e) {
    var panel = dragRef.current;
    if (!panel) return;
    var r = panel.getBoundingClientRect();
    var sx = e.clientX, startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    function move(ev) { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - e.clientY) }; clamp(); }
    function up() { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={function(e){e.stopPropagation();}} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRow({ label, value, children, inline }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>

        <span>{label}</span>

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={function(e){onChange(e.target.value);}}>
        {options.map(function(o) {
          var v = typeof o === 'object' ? o.value : o;
          var l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}

}

function TweakRadio({ label, value, options, onChange }) {
  var opts = options.map(function(o){ return typeof o === 'object' ? o : { value: o, label: o }; });
  var idx = Math.max(0, opts.findIndex(function(o){ return o.value === value; }));
  var n = opts.length;
  return (
    <TweakRow label={label}>
      <div role="radiogroup" style={{position:'relative',display:'flex',padding:'2px',borderRadius:'8px',background:'rgba(0,0,0,.06)'}}>
        <div style={{position:'absolute',top:'2px',bottom:'2px',borderRadius:'6px',background:'rgba(255,255,255,.9)',boxShadow:'0 1px 2px rgba(0,0,0,.12)',transition:'left .15s,width .15s',left:`calc(2px + ${idx} * (100% - 4px) / ${n})`,width:`calc((100% - 4px) / ${n})`}} />
        {opts.map(function(o){
          return <button key={o.value} type="button" role="radio" aria-checked={o.value===value} onClick={function(){onChange(o.value);}} style={{appearance:'none',position:'relative',zIndex:1,flex:1,border:0,background:'transparent',font:'inherit',fontWeight:500,minHeight:'22px',borderRadius:'6px',cursor:'default',padding:'4px 6px',lineHeight:1.2}}>{o.label}</button>;
        })}
      </div>
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={function(){onChange(!value);}}><i /></button>
    </div>
  );
}

function EmailForm({ id, ctaLabel, placeholder, onSubmit, variant, sideNote }) {
  ctaLabel = ctaLabel || FORM_DEFAULT_CTA;
  const [email, setEmail] = React.useState('');
  const [err, setErr] = React.useState('');
  const [sent, setSent] = React.useState(false);
  function handle(e) {
    e.preventDefault();
    var clean = email.trim();
    if (!clean) { setErr("Hai dimenticato l'email. È già a verbale."); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clean)) { setErr('Questa email non sembra valida. Richiesta perizia.'); return; }
    setErr(''); setSent(true); onSubmit(clean);
  }
  return (
    <form id={id} className={variant === 'offer' ? 'offer-form' : variant === 'lui' ? 'lui-form' : 'hero-form'} onSubmit={handle} noValidate>
      <div className={sideNote ? 'form-with-note' : undefined}>
        <div className="form-row">
          <input type="email" placeholder={placeholder || 'la-tua-email@dominio.it'} value={email}
            onChange={function(e){ setEmail(e.target.value); setErr(''); setSent(false); }}
            aria-label="Inserisci la tua email" />
          <button type="submit">{ctaLabel} →</button>
        </div>
        {sideNote && <div className="form-side-note">{sideNote}</div>}
      </div>

          <span>↳ Ti scrivo solo quando il libro sarà gratis su Kindle.</span>
          <span>1 sola email. Poi sparisco.</span>

  );

          <p><b>Il Coinquilino</b> è una narrazione comica e clinica sull'overthinking. Non sostituisce un terapeuta, non ti "guarisce" e non vende miracoli quantici. Fa una cosa più onesta: dà un volto e un nome a quella voce logorante che sei abituato a chiamare "me".</p>
        </div>
      </div>
    </section>
  );
}

      <div className="wrap">
        <div className="offer-block">
          <div className="offer-grid">
            <div>
              <span className="kicker no-rule offer-kicker">↳ Offerta di lancio</span>
              <h2 className="h-display">Per 5 giorni<br />a zero euro</h2>
              <p className="offer-copy">Al lancio, <b>Il Coinquilino</b> sarà <b>gratis su Amazon Kindle per 5 giorni</b>. Niente trucchi, niente funnel infiniti. Solo il file pulito, gratis, finché la finestra resta aperta.<br /><br />Chi entra in lista riceve <b>un solo avviso</b>: al momento giusto.</p>
              <EmailForm id="offer-form" ctaLabel="Mettimi in lista" placeholder="la-tua-email@dominio.it" onSubmit={onSubmit} variant="offer" />
            </div>

              <div className="price-note">● l'email serve solo ad avvisarti all'apertura</div>

          </div>

            A un certo punto ha smesso di temerlo e ha iniziato a prendere appunti.<br />

        <h2>Sfratta<br /><span className="red">il coinquilino</span></h2>

  return (

// ── APP ─────────────────────────────────────────────────────
const HEADLINES = [
  'Non sei tu.<br/><span class="accent">È il Coinquilino.</span>',
  'Vive nella <span class="underline">tua testa</span>,<br/>commenta tutto e<br/><span class="accent">non paga l\'affitto.</span>',
  'Hai presente quella<br/><span class="underline">voce</span> che rovina tutto?<br/><span class="accent">Ha un nome.</span>',
  'Pensa lui.<br/>Decide lui.<br/><span class="accent">Tu lo subaffitti.</span>',
  'Lo ascolti da<br/>vent\'anni.<br/><span class="accent">Senza prove.</span>',
];

const CTA_OPTIONS = [
  "Avvisami quando esce gratis",
  "Voglio sfrattare il Coinquilino",
  "Mandami l'avviso del lancio",
  "Mettimi in lista",
  "Iscrivimi al fascicolo",
];

const TWEAK_DEFAULTS = { headlineIndex: 0, ctaIndex: 0 };

function App() {
  const [t, setT] = useTweaks(TWEAK_DEFAULTS);
  const [successEmail, setSuccessEmail] = React.useState(null);
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(function() {
    function h() { setScrolled(window.scrollY > 8); }
    h();
    window.addEventListener('scroll', h, { passive: true });
    return function() { window.removeEventListener('scroll', h); };
  }, []);

  function handleSubmit(email) {
    setSuccessEmail(email);
    try { localStorage.setItem('il-coinquilino-list', email); } catch(e) {}
    fetch(
      'https://docs.google.com/forms/d/e/1FAIpQLSeyPjNC2ei9VCP52EZ2DyIxbXE_-WN-ujLNhqUecoWS-rKk9g/formResponse',
      {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'entry.316277458=' + encodeURIComponent(email)
      }
    );
  }

  var headline = HEADLINES[t.headlineIndex] || HEADLINES[0];
  var ctaLabel = CTA_OPTIONS[t.ctaIndex] || CTA_OPTIONS[0];

  function goToHero() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    var input = document.querySelector('#hero-form input');
    if (input) setTimeout(function(){ input.focus(); }, 400);
  }

  return (
    <>
      <div className={'topbar' + (scrolled ? ' scrolled' : '')}>
        <div className="topbar-inner">
          <div className="topbar-mark"><span className="dot"></span><span>Il Coinquilino · Maruth Rein</span></div>
          <div className="topbar-meta">
            <span>Prelancio</span><span>·</span>
            <span style={{color:'var(--red)'}}>● 5 giorni gratis al lancio</span>
          </div>
          <button className="topbar-cta" onClick={goToHero}>{ctaLabel} →</button>
        </div>
      </div>

      <Hero headline={headline} ctaLabel={ctaLabel} onSubmit={handleSubmit} />
      <Marquee />
      <Problema />
      <Concept />
      <Offerta ctaLabel={ctaLabel} onSubmit={handleSubmit} />
      <CosaTroverai />
      <Estratti />
      <Audience onSubmit={handleSubmit} />
      <Disclaimer />
      <Autore />
      <FinalCTA ctaLabel={ctaLabel} onSubmit={handleSubmit} />
      <Foot />

      {successEmail && <SuccessModal email={successEmail} onClose={function(){ setSuccessEmail(null); }} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero headline">
          <TweakSelect label="Variante" value={t.headlineIndex}
            onChange={function(v){ setT('headlineIndex', parseInt(v,10)); }}
            options={HEADLINES.map(function(h,i){ return { value:i, label:'Opzione '+(i+1)+' — '+h.replace(/<[^>]+>/g,' ').trim().slice(0,38)+'…' }; })} />
        </TweakSection>
        <TweakSection label="Pulsante CTA">
          <TweakRadio label="Etichetta" value={t.ctaIndex}
            onChange={function(v){ setT('ctaIndex', parseInt(v,10)); }}
            options={[{value:0,label:'Avvisami'},{value:1,label:'Sfratta'},{value:2,label:'Avviso'}]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
